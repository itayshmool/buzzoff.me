services:
  # Backend API
  - type: web
    name: buzzoff-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buzzoff-db
          property: connectionString
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_CORS_ORIGINS
        value: https://buzzoff-admin.onrender.com,https://admin.buzzoff.me
      - key: PACK_STORAGE_PATH
        value: /data/packs
    disk:
      name: packs
      mountPath: /data/packs
      sizeGB: 1

  # Admin Frontend
  - type: web
    name: buzzoff-admin
    runtime: static
    rootDir: admin
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Landing Page Website
  - type: web
    name: buzzoff-website
    runtime: static
    rootDir: website
    buildCommand: echo 'static site, no build needed'
    staticPublishPath: .

databases:
  - name: buzzoff-db
    plan: free
    postgresMajorVersion: 16
    postGISEnabled: true
