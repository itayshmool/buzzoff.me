<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E52521"/>
      <stop offset="100%" style="stop-color:#B81E1B"/>
    </linearGradient>
    <linearGradient id="lensOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <radialGradient id="lensInner" cx="45%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#2a2a3a"/>
      <stop offset="60%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#000005"/>
    </radialGradient>
    <radialGradient id="flare5" cx="35%" cy="30%" r="45%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="lensShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="recGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="rainbow5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E52521"/>
      <stop offset="20%" style="stop-color:#FF6B00"/>
      <stop offset="40%" style="stop-color:#FBD000"/>
      <stop offset="60%" style="stop-color:#43B047"/>
      <stop offset="80%" style="stop-color:#049CD8"/>
      <stop offset="100%" style="stop-color:#7B2FBE"/>
    </linearGradient>
  </defs>

  <!-- Background - bold red -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg5)"/>

  <!-- Checkered flag pattern (subtle) -->
  <g opacity="0.06">
    <rect x="0" y="0" width="64" height="64" fill="#fff"/>
    <rect x="128" y="0" width="64" height="64" fill="#fff"/>
    <rect x="256" y="0" width="64" height="64" fill="#fff"/>
    <rect x="384" y="0" width="64" height="64" fill="#fff"/>
    <rect x="512" y="0" width="64" height="64" fill="#fff"/>
    <rect x="640" y="0" width="64" height="64" fill="#fff"/>
    <rect x="768" y="0" width="64" height="64" fill="#fff"/>
    <rect x="896" y="0" width="64" height="64" fill="#fff"/>
    <rect x="64" y="64" width="64" height="64" fill="#fff"/>
    <rect x="192" y="64" width="64" height="64" fill="#fff"/>
    <rect x="320" y="64" width="64" height="64" fill="#fff"/>
    <rect x="448" y="64" width="64" height="64" fill="#fff"/>
    <rect x="576" y="64" width="64" height="64" fill="#fff"/>
    <rect x="704" y="64" width="64" height="64" fill="#fff"/>
    <rect x="832" y="64" width="64" height="64" fill="#fff"/>
    <rect x="960" y="64" width="64" height="64" fill="#fff"/>
    <rect x="0" y="896" width="64" height="64" fill="#fff"/>
    <rect x="128" y="896" width="64" height="64" fill="#fff"/>
    <rect x="256" y="896" width="64" height="64" fill="#fff"/>
    <rect x="384" y="896" width="64" height="64" fill="#fff"/>
    <rect x="512" y="896" width="64" height="64" fill="#fff"/>
    <rect x="640" y="896" width="64" height="64" fill="#fff"/>
    <rect x="768" y="896" width="64" height="64" fill="#fff"/>
    <rect x="896" y="896" width="64" height="64" fill="#fff"/>
    <rect x="64" y="960" width="64" height="64" fill="#fff"/>
    <rect x="192" y="960" width="64" height="64" fill="#fff"/>
    <rect x="320" y="960" width="64" height="64" fill="#fff"/>
    <rect x="448" y="960" width="64" height="64" fill="#fff"/>
    <rect x="576" y="960" width="64" height="64" fill="#fff"/>
    <rect x="704" y="960" width="64" height="64" fill="#fff"/>
    <rect x="832" y="960" width="64" height="64" fill="#fff"/>
    <rect x="960" y="960" width="64" height="64" fill="#fff"/>
  </g>

  <!-- Speed lines behind lens -->
  <g opacity="0.12">
    <line x1="100" y1="512" x2="280" y2="512" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <line x1="120" y1="420" x2="260" y2="450" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="120" y1="604" x2="260" y2="574" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="744" y1="512" x2="924" y2="512" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <line x1="764" y1="450" x2="904" y2="420" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="764" y1="574" x2="904" y2="604" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Large camera lens -->
  <g filter="url(#lensShadow)">
    <!-- Outer chrome ring -->
    <circle cx="512" cy="480" r="260" fill="url(#lensOuter)" stroke="#888" stroke-width="4"/>
    <!-- Lens barrel ring -->
    <circle cx="512" cy="480" r="230" fill="#333" stroke="#555" stroke-width="3"/>
    <!-- Inner dark lens -->
    <circle cx="512" cy="480" r="200" fill="url(#lensInner)"/>
    <!-- Aperture blades hint -->
    <circle cx="512" cy="480" r="160" fill="none" stroke="#444" stroke-width="2"/>
    <circle cx="512" cy="480" r="120" fill="none" stroke="#3a3a4a" stroke-width="2"/>
    <circle cx="512" cy="480" r="80" fill="#0a0a12"/>
    <!-- Glass flare -->
    <circle cx="512" cy="480" r="200" fill="url(#flare5)"/>
    <!-- Recording dot -->
    <circle cx="512" cy="480" r="24" fill="#E52521" filter="url(#recGlow)"/>
  </g>

  <!-- "NO" slash across the lens (speed camera = no!) -->
  <line x1="340" y1="300" x2="684" y2="660" stroke="#FBD000" stroke-width="16" stroke-linecap="round" opacity="0.85"/>

  <!-- BUZZOFF text below -->
  <text x="512" y="810" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="72" font-weight="900" fill="#fff" letter-spacing="12" opacity="0.95">BUZZOFF</text>

  <!-- Rainbow underline -->
  <rect x="240" y="835" width="544" height="5" rx="3" fill="url(#rainbow5)" opacity="0.7"/>
</svg>
