<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#ff2d2d"/>
    </linearGradient>
    <linearGradient id="cameraBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436"/>
      <stop offset="40%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a15"/>
    </linearGradient>
    <radialGradient id="lensFlare" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedRect">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle radial pulse rings -->
  <circle cx="512" cy="460" r="340" fill="none" stroke="#ff4757" stroke-width="1.5" opacity="0.12"/>
  <circle cx="512" cy="460" r="280" fill="none" stroke="#ff4757" stroke-width="1.5" opacity="0.18"/>
  <circle cx="512" cy="460" r="220" fill="none" stroke="#ff4757" stroke-width="1.5" opacity="0.25"/>

  <!-- Camera pole -->
  <rect x="490" y="560" width="44" height="180" rx="6" fill="#707080"/>
  <rect x="470" y="720" width="84" height="20" rx="10" fill="#606070"/>

  <!-- Camera housing (body) -->
  <rect x="370" y="340" width="284" height="200" rx="28" fill="url(#cameraBody)" stroke="#888" stroke-width="3"/>

  <!-- Camera top ridge -->
  <rect x="390" y="330" width="244" height="24" rx="12" fill="#c8c8d0"/>

  <!-- Flash unit on top -->
  <rect x="460" y="295" width="104" height="42" rx="8" fill="#d0d0d8" stroke="#aaa" stroke-width="2"/>
  <rect x="472" y="303" width="80" height="26" rx="4" fill="#ffeb3b" opacity="0.6"/>

  <!-- Camera lens (main) -->
  <circle cx="512" cy="440" r="72" fill="url(#lens)" stroke="#555" stroke-width="4"/>
  <circle cx="512" cy="440" r="56" fill="none" stroke="#444" stroke-width="2"/>
  <circle cx="512" cy="440" r="40" fill="#0d0d1a" stroke="#333" stroke-width="2"/>
  <!-- Lens flare -->
  <circle cx="512" cy="440" r="72" fill="url(#lensFlare)"/>
  <!-- Red recording dot -->
  <circle cx="512" cy="440" r="12" fill="#ff2d2d" filter="url(#glow)" opacity="0.9"/>

  <!-- Warning triangle -->
  <g filter="url(#softGlow)" transform="translate(512, 820)">
    <polygon points="0,-70 65,50 -65,50" fill="url(#redGlow)" stroke="#ff6b6b" stroke-width="3" stroke-linejoin="round"/>
    <!-- Exclamation mark -->
    <rect x="-7" y="-42" width="14" height="48" rx="5" fill="#fff"/>
    <circle cx="0" cy="26" r="8" fill="#fff"/>
  </g>

  <!-- Speed lines (left) -->
  <g opacity="0.4" stroke="#ff4757" stroke-width="4" stroke-linecap="round">
    <line x1="100" y1="380" x2="200" y2="380"/>
    <line x1="70" y1="440" x2="190" y2="440"/>
    <line x1="100" y1="500" x2="200" y2="500"/>
  </g>

  <!-- Speed lines (right) -->
  <g opacity="0.4" stroke="#ff4757" stroke-width="4" stroke-linecap="round">
    <line x1="824" y1="380" x2="924" y2="380"/>
    <line x1="834" y1="440" x2="954" y2="440"/>
    <line x1="824" y1="500" x2="924" y2="500"/>
  </g>
</svg>
