<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1e"/>
    </linearGradient>
    <linearGradient id="cameraBody5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <linearGradient id="lens5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436"/>
      <stop offset="100%" style="stop-color:#0a0a15"/>
    </linearGradient>
    <linearGradient id="shellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#C62828"/>
    </linearGradient>
    <radialGradient id="lensFlare5" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shellGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg5)"/>

  <!-- Red shell circle behind camera (like targeting) -->
  <g filter="url(#shellGlow)">
    <circle cx="512" cy="440" r="300" fill="none" stroke="#ff4757" stroke-width="8" opacity="0.12"/>
    <circle cx="512" cy="440" r="240" fill="none" stroke="#ff4757" stroke-width="6" opacity="0.18"/>
  </g>

  <!-- Shell-style shield/circle behind camera -->
  <circle cx="512" cy="430" r="200" fill="url(#shellGrad)" opacity="0.08"/>
  <circle cx="512" cy="430" r="200" fill="none" stroke="#ff4757" stroke-width="4" opacity="0.25"/>

  <!-- Shell ridges (like red shell texture) -->
  <g opacity="0.12" stroke="#ff4757" stroke-width="3" fill="none">
    <path d="M 370 300 Q 512 200 654 300"/>
    <path d="M 340 380 Q 512 260 684 380"/>
    <path d="M 340 460 Q 512 340 684 460"/>
    <path d="M 370 540 Q 512 420 654 540"/>
  </g>

  <!-- Camera pole -->
  <rect x="492" y="530" width="40" height="150" rx="6" fill="#707080"/>

  <!-- Camera housing -->
  <rect x="380" y="310" width="264" height="200" rx="24" fill="url(#cameraBody5)" stroke="#888" stroke-width="3"/>
  <rect x="398" y="300" width="228" height="22" rx="11" fill="#c8c8d0"/>

  <!-- Flash unit - amber -->
  <rect x="462" y="268" width="100" height="38" rx="8" fill="#d0d0d8" stroke="#aaa" stroke-width="2"/>
  <rect x="474" y="276" width="76" height="22" rx="4" fill="#FF8C00" opacity="0.7"/>

  <!-- Camera lens -->
  <circle cx="512" cy="410" r="68" fill="url(#lens5)" stroke="#555" stroke-width="4"/>
  <circle cx="512" cy="410" r="52" fill="none" stroke="#444" stroke-width="2"/>
  <circle cx="512" cy="410" r="38" fill="#0d0d1a" stroke="#333" stroke-width="2"/>
  <circle cx="512" cy="410" r="68" fill="url(#lensFlare5)"/>
  <circle cx="512" cy="410" r="12" fill="#ff2d2d" filter="url(#glow5)" opacity="0.9"/>

  <!-- Crosshair targeting overlay (red shell lock-on) -->
  <g opacity="0.2" stroke="#ff4757" stroke-width="2">
    <line x1="512" y1="200" x2="512" y2="280"/>
    <line x1="512" y1="560" x2="512" y2="640"/>
    <line x1="280" y1="410" x2="360" y2="410"/>
    <line x1="664" y1="410" x2="744" y2="410"/>
  </g>
  <!-- Corner brackets (lock-on UI) -->
  <g opacity="0.3" stroke="#FF8C00" stroke-width="3" fill="none">
    <path d="M 320 280 L 320 240 L 360 240"/>
    <path d="M 704 280 L 704 240 L 664 240"/>
    <path d="M 320 580 L 320 620 L 360 620"/>
    <path d="M 704 580 L 704 620 L 664 620"/>
  </g>

  <!-- Warning triangle -->
  <g transform="translate(512, 780)">
    <polygon points="0,-52 48,36 -48,36" fill="#ff4757" stroke="#ff6b6b" stroke-width="3" stroke-linejoin="round"/>
    <rect x="-5" y="-30" width="10" height="34" rx="4" fill="#fff"/>
    <circle cx="0" cy="18" r="6" fill="#fff"/>
  </g>

  <!-- Speed lines -->
  <g opacity="0.4" stroke="#FF8C00" stroke-width="4" stroke-linecap="round">
    <line x1="90" y1="350" x2="200" y2="350"/>
    <line x1="60" y1="410" x2="190" y2="410"/>
    <line x1="90" y1="470" x2="200" y2="470"/>
  </g>
  <g opacity="0.4" stroke="#FF8C00" stroke-width="4" stroke-linecap="round">
    <line x1="824" y1="350" x2="934" y2="350"/>
    <line x1="834" y1="410" x2="964" y2="410"/>
    <line x1="824" y1="470" x2="934" y2="470"/>
  </g>
</svg>
