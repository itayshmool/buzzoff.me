<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3a"/>
      <stop offset="100%" style="stop-color:#1a1a28"/>
    </linearGradient>
    <linearGradient id="cameraBody3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <linearGradient id="lens3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436"/>
      <stop offset="100%" style="stop-color:#0a0a15"/>
    </linearGradient>
    <linearGradient id="boostPad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="50%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <radialGradient id="lensFlare3" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow3">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg3)"/>

  <!-- Road surface (perspective) -->
  <polygon points="340,1024 684,1024 620,580 404,580" fill="url(#road)"/>

  <!-- Road edge lines (white) -->
  <line x1="350" y1="1000" x2="410" y2="580" stroke="#fff" stroke-width="4" opacity="0.4"/>
  <line x1="674" y1="1000" x2="614" y2="580" stroke="#fff" stroke-width="4" opacity="0.4"/>

  <!-- Road center dashes -->
  <line x1="512" y1="1000" x2="512" y2="870" stroke="#FF8C00" stroke-width="6" opacity="0.6" stroke-dasharray="30 20"/>
  <line x1="512" y1="840" x2="512" y2="710" stroke="#FF8C00" stroke-width="5" opacity="0.5" stroke-dasharray="24 16"/>
  <line x1="512" y1="680" x2="512" y2="590" stroke="#FF8C00" stroke-width="4" opacity="0.4" stroke-dasharray="18 12"/>

  <!-- Boost pad on road -->
  <g opacity="0.35">
    <polygon points="460,900 552,900 548,840 464,840" fill="url(#boostPad)"/>
    <!-- Boost arrows -->
    <polygon points="500,880 512,855 524,880" fill="#fff" opacity="0.6"/>
    <polygon points="500,870 512,845 524,870" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Radar rings -->
  <circle cx="512" cy="380" r="220" fill="none" stroke="#FF8C00" stroke-width="1.5" opacity="0.15"/>
  <circle cx="512" cy="380" r="160" fill="none" stroke="#FF8C00" stroke-width="1.5" opacity="0.22"/>

  <!-- Camera pole -->
  <rect x="492" y="480" width="40" height="120" rx="6" fill="#707080"/>

  <!-- Camera housing -->
  <rect x="380" y="270" width="264" height="190" rx="24" fill="url(#cameraBody3)" stroke="#888" stroke-width="3"/>
  <rect x="398" y="260" width="228" height="22" rx="11" fill="#c8c8d0"/>

  <!-- Flash unit -->
  <rect x="462" y="228" width="100" height="38" rx="8" fill="#d0d0d8" stroke="#aaa" stroke-width="2"/>
  <rect x="474" y="236" width="76" height="22" rx="4" fill="#FF8C00" opacity="0.7"/>

  <!-- Camera lens -->
  <circle cx="512" cy="365" r="66" fill="url(#lens3)" stroke="#555" stroke-width="4"/>
  <circle cx="512" cy="365" r="50" fill="none" stroke="#444" stroke-width="2"/>
  <circle cx="512" cy="365" r="36" fill="#0d0d1a" stroke="#333" stroke-width="2"/>
  <circle cx="512" cy="365" r="66" fill="url(#lensFlare3)"/>
  <circle cx="512" cy="365" r="11" fill="#ff2d2d" filter="url(#glow3)" opacity="0.9"/>

  <!-- Warning triangle at base -->
  <g filter="url(#softGlow3)" transform="translate(512, 680)">
    <polygon points="0,-48 42,32 -42,32" fill="#ff4757" stroke="#ff6b6b" stroke-width="3" stroke-linejoin="round"/>
    <rect x="-5" y="-28" width="10" height="32" rx="4" fill="#fff"/>
    <circle cx="0" cy="16" r="6" fill="#fff"/>
  </g>
</svg>
