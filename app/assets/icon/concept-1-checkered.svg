<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <linearGradient id="cameraBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436"/>
      <stop offset="100%" style="stop-color:#0a0a15"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#ff2d2d"/>
    </linearGradient>
    <radialGradient id="lensFlare" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="checker" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#fff" opacity="0.12"/>
      <rect x="32" y="32" width="32" height="32" fill="#fff" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Checkered flag pattern - top left corner -->
  <g clip-path="url(#tlClip)" opacity="0.6">
    <rect x="0" y="0" width="320" height="320" fill="url(#checker)"/>
  </g>
  <clipPath id="tlClip"><rect x="0" y="0" width="300" height="300" rx="224"/></clipPath>

  <!-- Checkered flag pattern - bottom right corner -->
  <g clip-path="url(#brClip)" opacity="0.6">
    <rect x="724" y="724" width="300" height="300" fill="url(#checker)"/>
  </g>
  <clipPath id="brClip"><rect x="724" y="724" width="300" height="300" rx="224"/></clipPath>

  <!-- Checkered banner strip across top -->
  <g opacity="0.25">
    <pattern id="checkerBanner" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#fff"/>
      <rect x="24" y="24" width="24" height="24" fill="#fff"/>
    </pattern>
    <rect x="0" y="100" width="1024" height="48" fill="url(#checkerBanner)"/>
    <rect x="0" y="876" width="1024" height="48" fill="url(#checkerBanner)"/>
  </g>

  <!-- Radar rings with amber -->
  <circle cx="512" cy="440" r="280" fill="none" stroke="#FF8C00" stroke-width="1.5" opacity="0.12"/>
  <circle cx="512" cy="440" r="220" fill="none" stroke="#FF8C00" stroke-width="1.5" opacity="0.18"/>
  <circle cx="512" cy="440" r="160" fill="none" stroke="#FF8C00" stroke-width="2" opacity="0.25"/>

  <!-- Camera pole -->
  <rect x="490" y="540" width="44" height="160" rx="6" fill="#707080"/>

  <!-- Camera housing -->
  <rect x="370" y="320" width="284" height="200" rx="28" fill="url(#cameraBody)" stroke="#888" stroke-width="3"/>
  <rect x="390" y="310" width="244" height="24" rx="12" fill="#c8c8d0"/>

  <!-- Flash unit -->
  <rect x="460" y="275" width="104" height="42" rx="8" fill="#d0d0d8" stroke="#aaa" stroke-width="2"/>
  <rect x="472" y="283" width="80" height="26" rx="4" fill="#FF8C00" opacity="0.7"/>

  <!-- Camera lens -->
  <circle cx="512" cy="420" r="72" fill="url(#lens)" stroke="#555" stroke-width="4"/>
  <circle cx="512" cy="420" r="56" fill="none" stroke="#444" stroke-width="2"/>
  <circle cx="512" cy="420" r="40" fill="#0d0d1a" stroke="#333" stroke-width="2"/>
  <circle cx="512" cy="420" r="72" fill="url(#lensFlare)"/>
  <circle cx="512" cy="420" r="12" fill="#ff2d2d" filter="url(#glow)" opacity="0.9"/>

  <!-- Warning triangle -->
  <g filter="url(#softGlow)" transform="translate(512, 790)">
    <polygon points="0,-60 55,42 -55,42" fill="url(#redGlow)" stroke="#ff6b6b" stroke-width="3" stroke-linejoin="round"/>
    <rect x="-6" y="-36" width="12" height="40" rx="4" fill="#fff"/>
    <circle cx="0" cy="22" r="7" fill="#fff"/>
  </g>

  <!-- Speed lines amber -->
  <g opacity="0.5" stroke="#FF8C00" stroke-width="4" stroke-linecap="round">
    <line x1="100" y1="360" x2="210" y2="360"/>
    <line x1="70" y1="420" x2="200" y2="420"/>
    <line x1="100" y1="480" x2="210" y2="480"/>
  </g>
  <g opacity="0.5" stroke="#FF8C00" stroke-width="4" stroke-linecap="round">
    <line x1="814" y1="360" x2="924" y2="360"/>
    <line x1="824" y1="420" x2="954" y2="420"/>
    <line x1="814" y1="480" x2="924" y2="480"/>
  </g>
</svg>
