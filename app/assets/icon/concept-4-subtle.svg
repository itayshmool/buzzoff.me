<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1e"/>
    </linearGradient>
    <linearGradient id="cameraBody4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <linearGradient id="lens4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436"/>
      <stop offset="100%" style="stop-color:#0a0a15"/>
    </linearGradient>
    <linearGradient id="redGlow4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4757"/>
      <stop offset="100%" style="stop-color:#ff2d2d"/>
    </linearGradient>
    <radialGradient id="lensFlare4" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow4">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="checkerSmall" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#fff" opacity="0.15"/>
      <rect x="20" y="20" width="20" height="20" fill="#fff" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg4)"/>

  <!-- Subtle checkered corners -->
  <g opacity="0.3">
    <rect x="0" y="0" width="180" height="180" fill="url(#checkerSmall)" clip-path="url(#cornerTL)"/>
    <rect x="844" y="844" width="180" height="180" fill="url(#checkerSmall)" clip-path="url(#cornerBR)"/>
  </g>
  <clipPath id="cornerTL"><rect x="0" y="0" width="180" height="180" rx="224"/></clipPath>
  <clipPath id="cornerBR"><rect x="844" y="844" width="180" height="180" rx="224"/></clipPath>

  <!-- Radar rings - amber -->
  <circle cx="512" cy="440" r="300" fill="none" stroke="#FF8C00" stroke-width="1.5" opacity="0.1"/>
  <circle cx="512" cy="440" r="240" fill="none" stroke="#FF8C00" stroke-width="1.5" opacity="0.15"/>
  <circle cx="512" cy="440" r="180" fill="none" stroke="#FF8C00" stroke-width="2" opacity="0.22"/>

  <!-- Camera pole -->
  <rect x="490" y="540" width="44" height="170" rx="6" fill="#707080"/>
  <rect x="470" y="690" width="84" height="20" rx="10" fill="#606070"/>

  <!-- Camera housing -->
  <rect x="370" y="320" width="284" height="200" rx="28" fill="url(#cameraBody4)" stroke="#888" stroke-width="3"/>
  <rect x="390" y="310" width="244" height="24" rx="12" fill="#c8c8d0"/>

  <!-- Flash unit - amber -->
  <rect x="460" y="275" width="104" height="42" rx="8" fill="#d0d0d8" stroke="#aaa" stroke-width="2"/>
  <rect x="472" y="283" width="80" height="26" rx="4" fill="#FF8C00" opacity="0.7"/>

  <!-- Camera lens -->
  <circle cx="512" cy="420" r="72" fill="url(#lens4)" stroke="#555" stroke-width="4"/>
  <circle cx="512" cy="420" r="56" fill="none" stroke="#444" stroke-width="2"/>
  <circle cx="512" cy="420" r="40" fill="#0d0d1a" stroke="#333" stroke-width="2"/>
  <circle cx="512" cy="420" r="72" fill="url(#lensFlare4)"/>
  <circle cx="512" cy="420" r="12" fill="#ff2d2d" filter="url(#glow4)" opacity="0.9"/>

  <!-- Warning triangle -->
  <g filter="url(#softGlow4)" transform="translate(512, 810)">
    <polygon points="0,-65 60,46 -60,46" fill="url(#redGlow4)" stroke="#ff6b6b" stroke-width="3" stroke-linejoin="round"/>
    <rect x="-6" y="-38" width="12" height="44" rx="5" fill="#fff"/>
    <circle cx="0" cy="24" r="7" fill="#fff"/>
  </g>

  <!-- Boost trail speed lines (amber, like mushroom boost) -->
  <g opacity="0.5" stroke="#FF8C00" stroke-width="5" stroke-linecap="round">
    <line x1="90" y1="360" x2="220" y2="360"/>
    <line x1="60" y1="420" x2="210" y2="420"/>
    <line x1="90" y1="480" x2="220" y2="480"/>
  </g>
  <g opacity="0.5" stroke="#FF8C00" stroke-width="5" stroke-linecap="round">
    <line x1="804" y1="360" x2="934" y2="360"/>
    <line x1="814" y1="420" x2="964" y2="420"/>
    <line x1="804" y1="480" x2="934" y2="480"/>
  </g>

  <!-- Small star sparkles (coin/star pickup) -->
  <g fill="#FF8C00" opacity="0.4">
    <circle cx="200" cy="220" r="4"/>
    <circle cx="824" cy="220" r="4"/>
    <circle cx="160" cy="700" r="3"/>
    <circle cx="864" cy="700" r="3"/>
  </g>
</svg>
