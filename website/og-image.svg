<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>

    <!-- Rainbow gradient -->
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E52521"/>
      <stop offset="20%" stop-color="#FF6B00"/>
      <stop offset="40%" stop-color="#FBD000"/>
      <stop offset="60%" stop-color="#43B047"/>
      <stop offset="80%" stop-color="#049CD8"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>

    <!-- Red gradient for lens background -->
    <radialGradient id="lensOuter" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="85%" stop-color="#333"/>
      <stop offset="100%" stop-color="#222"/>
    </radialGradient>

    <radialGradient id="lensInner" cx="0.45" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="50%" stop-color="#222"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>

    <!-- Chrome ring gradient -->
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="30%" stop-color="#B0B0B0"/>
      <stop offset="50%" stop-color="#D8D8D8"/>
      <stop offset="70%" stop-color="#909090"/>
      <stop offset="100%" stop-color="#C0C0C0"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#E52521" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>

    <!-- Checkered pattern -->
    <pattern id="checker" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="rgba(255,255,255,0.03)"/>
      <rect x="20" y="20" width="20" height="20" fill="rgba(255,255,255,0.03)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Checkered pattern overlay -->
  <rect width="1200" height="630" fill="url(#checker)"/>

  <!-- Subtle speed lines -->
  <g opacity="0.06">
    <line x1="0" y1="200" x2="350" y2="260" stroke="white" stroke-width="2"/>
    <line x1="0" y1="280" x2="300" y2="310" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="350" x2="320" y2="340" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="340" y2="380" stroke="white" stroke-width="1.5"/>
    <line x1="850" y1="200" x2="1200" y2="150" stroke="white" stroke-width="2"/>
    <line x1="880" y1="280" x2="1200" y2="240" stroke="white" stroke-width="1.5"/>
    <line x1="860" y1="360" x2="1200" y2="340" stroke="white" stroke-width="1"/>
    <line x1="870" y1="440" x2="1200" y2="430" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- Camera lens group - positioned left-center -->
  <g transform="translate(280, 290)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#E52521" stroke-width="1" opacity="0.15" filter="url(#redGlow)"/>

    <!-- Chrome ring -->
    <circle cx="0" cy="0" r="120" fill="url(#chrome)" stroke="#999" stroke-width="1"/>

    <!-- Lens body -->
    <circle cx="0" cy="0" r="108" fill="url(#lensOuter)"/>

    <!-- Inner lens -->
    <circle cx="0" cy="0" r="90" fill="url(#lensInner)"/>

    <!-- Lens rings -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>

    <!-- Recording dot -->
    <circle cx="0" cy="0" r="8" fill="#E52521" opacity="0.9"/>
    <circle cx="0" cy="0" r="4" fill="#FF4444"/>

    <!-- Gold slash (NO line) -->
    <line x1="-75" y1="75" x2="75" y2="-75" stroke="#FBD000" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
    <line x1="-75" y1="75" x2="75" y2="-75" stroke="#FFE135" stroke-width="5" stroke-linecap="round" opacity="0.4"/>

    <!-- Speed lines around lens -->
    <line x1="-140" y1="0" x2="-155" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
    <line x1="140" y1="0" x2="155" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-135" y1="-35" x2="-148" y2="-40" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="135" y1="-35" x2="148" y2="-40" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-135" y1="35" x2="-148" y2="40" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="135" y1="35" x2="148" y2="40" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Text group - right side -->
  <g>
    <!-- BUZZOFF title -->
    <text x="700" y="250" font-family="'Press Start 2P', 'Courier New', monospace" font-size="72" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="6" filter="url(#textGlow)">BUZZOFF</text>

    <!-- Rainbow underline -->
    <rect x="510" y="270" width="380" height="4" rx="2" fill="url(#rainbow)"/>

    <!-- Tagline -->
    <text x="700" y="330" font-family="'Russo One', 'Arial', sans-serif" font-size="28" fill="#f1f2f6" text-anchor="middle" letter-spacing="3" opacity="0.9">NEVER GET FLASHED AGAIN</text>

    <!-- Subtitle -->
    <text x="700" y="380" font-family="'Russo One', 'Arial', sans-serif" font-size="16" fill="#8b98a8" text-anchor="middle" letter-spacing="1">Speed camera alerts - Silent - Offline - Free</text>

    <!-- URL pill -->
    <rect x="620" y="420" width="160" height="36" rx="18" fill="none" stroke="url(#rainbow)" stroke-width="2"/>
    <text x="700" y="444" font-family="'Share Tech Mono', 'Courier New', monospace" font-size="16" fill="#FBD000" text-anchor="middle" letter-spacing="1">buzzoff.me</text>
  </g>

  <!-- Bottom rainbow stripe -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#rainbow)"/>

  <!-- Top subtle red accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#E52521" opacity="0.6"/>
</svg>
