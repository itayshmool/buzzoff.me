<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BuzzOff — Feature graphic 1024×500</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    .frame {
      width: 1024px;
      height: 500px;
      background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 50%, #0d0d0d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }
    .frame::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 50%, rgba(211, 84, 0, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .logo {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #FF8C00, #D35400);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 40px rgba(211, 84, 0, 0.35);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 800;
      font-size: 64px;
      color: #fff;
      letter-spacing: -0.03em;
    }
    .title {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 800;
      font-size: 56px;
      letter-spacing: -0.02em;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }
    .tagline {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: #D35400;
      letter-spacing: 0.02em;
    }
    .sub {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 500;
      font-size: 18px;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="logo">B</div>
    <div class="title">BuzzOff</div>
    <div class="tagline">Never get flashed again</div>
    <div class="sub">Speed camera alerts · Silent · Offline</div>
  </div>
  <p style="font-family:system-ui;font-size:12px;color:#666;padding:8px;">Open in a browser at 100% zoom. Resize the window to 1024×500 (or use DevTools → device toolbar → 1024×500), then screenshot the dark frame only. Upload as Feature graphic in Play Console.</p>
</body>
</html>
