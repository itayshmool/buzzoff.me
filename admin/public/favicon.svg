<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBD000"/>
      <stop offset="100%" stop-color="#D4A006"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#FBD000" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Camera lens - outer ring in gold/neon -->
  <circle cx="32" cy="30" r="18" fill="none" stroke="url(#ring)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Inner lens barrel -->
  <circle cx="32" cy="30" r="14.5" fill="#0a0a14" stroke="#333" stroke-width="1"/>

  <!-- Aperture rings -->
  <circle cx="32" cy="30" r="10" fill="none" stroke="#2a2a3a" stroke-width="0.8"/>
  <circle cx="32" cy="30" r="6" fill="none" stroke="#222233" stroke-width="0.8"/>

  <!-- Recording dot (red) -->
  <circle cx="32" cy="30" r="3" fill="#E52521" filter="url(#glow)"/>

  <!-- "NO" slash across lens in gold -->
  <line x1="20" y1="18" x2="44" y2="42" stroke="#FBD000" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- HQ text at bottom -->
  <text x="32" y="57" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="10" font-weight="900" fill="#FBD000" letter-spacing="2" opacity="0.9">HQ</text>
</svg>
